groups:
  - name: infra
    rules:
      - alert: TargetDown
        expr: up == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Monitoring target {{ $labels.job }} is unreachable"
          description: "{{ $labels.instance }} (job={{ $labels.job }}) has had no data for 2 minutes."

      - alert: DiskSpaceLow
        expr: (node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"}) * 100 < 10
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Disk space below 10%"
          description: '{{ $labels.instance }} has only {{ $value | printf "%.1f" }}% free space left on the root partition, which may cause checkpoint/log writes to fail.'

  - name: gpu
    rules:
      - alert: GPUHighTemperature
        expr: DCGM_FI_DEV_GPU_TEMP > 85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "GPU {{ $labels.gpu }} is running hot"
          description: "{{ $labels.modelName }} (gpu={{ $labels.gpu }}) has stayed above 85°C for 5 minutes, currently {{ $value }}°C."

      - alert: GPUXidError
        expr: DCGM_FI_DEV_XID_ERRORS > 0
        for: 0m
        labels:
          severity: critical
        annotations:
          summary: "GPU {{ $labels.gpu }} reported an XID error"
          description: "{{ $labels.modelName }} (gpu={{ $labels.gpu }}) reported XID error code {{ $value }}, which may indicate a dropped GPU or hardware fault."
